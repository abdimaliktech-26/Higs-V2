name: Higsi V2 CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/higsi_test?schema=public"
  AUTH_SECRET: "test-auth-secret-for-ci-at-least-32-chars"
  AUTH_URL: "http://localhost:3000"
  FILE_SIGNING_KEY: "test-file-signing-key-for-ci-at-least-32-chars"

jobs:
  quality:
    name: TypeCheck → Lint → Test → Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: higsi_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npx tsx prisma/seed.ts

      - name: Type check
        run: npm run typecheck
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Store build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/
